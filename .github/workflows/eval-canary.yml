# Weekly production eval canary. See docs/observability-slos.md §3.
#
# Runs the golden retrieval eval (which PR CI can never run — it needs live
# Supabase + OpenAI keys) plus a small answer-quality subset against the live
# project, and fails loudly on regression: red run + a GitHub issue on
# scheduled failures. Each run also uploads the eval JSON artifact that feeds
# offline ranking-snapshot regeneration (scripts/build-ranking-snapshot.ts).
#
# The schedule only fires from the default branch. After merging, trigger one
# workflow_dispatch run and confirm it is green before trusting the weekly
# cadence.
name: Eval Canary

on:
  workflow_dispatch:
    inputs:
      answer_case_limit:
        description: "Number of answer-quality cases to run (--limit)"
        required: false
        default: "44"
      # Staged ranking-weight evaluation (ADDENDUM 4 Phase B): a RAG_RANKING_CONFIG JSON
      # override evaluated live WITHOUT touching code defaults. Empty = production weights.
      # Malformed JSON fails the run loudly (validation step below) instead of silently
      # reverting to defaults and corrupting a baseline/post comparison.
      rag_ranking_config:
        description: "Optional RAG_RANKING_CONFIG JSON override (staged ranking weights); empty = production defaults"
        required: false
        default: ""
      # Pre-merge branch evals (Phase D-1): run the golden eval from a branch so ranking PRs
      # can gather live proof BEFORE merging. Dispatch requires repo write access, so refs are
      # limited to trusted collaborators' branches. Empty = the dispatched/default branch.
      ref:
        description: "Optional git ref (branch/SHA) to evaluate; empty = default branch"
        required: false
        default: ""
      # Phase E: opt-in run of the 30-case answer-quality/targeting eval (eval:answer-quality)
      # alongside the gate subset. Dispatch-only and default-off, so scheduled runs and
      # existing dispatch shapes are byte-identical. Informational: the script exits 0
      # without a --targeting-floor, so it can never fail the canary.
      answer_quality_eval:
        description: "Also run the 30-case answer-quality/targeting eval (eval:answer-quality); 'true' to enable"
        required: false
        default: ""
  schedule:
    # Sunday 18:00 UTC = Monday 02:00 Australia/Perth — off-peak for clinicians.
    - cron: "0 18 * * 0"

concurrency:
  group: eval-canary
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  NEXT_PUBLIC_SUPABASE_URL: https://sjrfecxgysukkwxsowpy.supabase.co
  SUPABASE_PROJECT_REF: sjrfecxgysukkwxsowpy
  SUPABASE_PROJECT_NAME: Clinical KB Database
  # Evals use the service-role admin client; the publishable key only needs to
  # satisfy env validation (same placeholder approach as ci.yml).
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-ci-anon-key
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  # Empty for schedule runs and default dispatches (resolveRankingConfig treats empty as
  # unset); non-empty only for staged ranking-weight evals via the dispatch input.
  RAG_RANKING_CONFIG: ${{ github.event.inputs.rag_ranking_config || '' }}
  # Pace golden retrieval so forced-vector probes do not trip transient 429s
  # after a long text-fast-path run (see vector-ptsd history in eval-canary).
  RAG_EVAL_CASE_DELAY_MS: 2000
  RAG_EVAL_FORCE_EMBEDDING_DELAY_MS: 5000
  RAG_EVAL_PROVIDER_RETRY_ATTEMPTS: 6
  RAG_EVAL_PROVIDER_RETRY_INITIAL_MS: 8000
  RAG_EVAL_PROVIDER_RETRY_MAX_MS: 120000
  # Cost self-reporting (estimated_cost_usd in eval summaries; was "n/a" with these unset).
  # Rates = gpt-5.6-terra standard tier per 1M tokens (verified from the OpenAI pricing page
  # 2026-07-21). The strong model (gpt-5.6-sol) costs 2x these rates and the estimator
  # applies ONE rate set to all usage, so estimated_cost_usd is a LOWER BOUND on runs where
  # strong retries fire. Public list prices, not secrets.
  RAG_EVAL_INPUT_USD_PER_MILLION: "2.50"
  RAG_EVAL_CACHED_INPUT_USD_PER_MILLION: "0.25"
  RAG_EVAL_OUTPUT_USD_PER_MILLION: "15.00"
  # The live corpus is all-public (owner_id = NULL). Owner-scoped retrieval
  # fail-closes on a null owner, so the eval must run as the public-owner
  # sentinel. resolveEvalOwnerId (scripts/eval-utils.ts) defaults to that
  # sentinel when no owner is set, so deliberately do NOT pin an eval owner
  # here — pinning the E2E user (who owns 0 public docs) returns 0 candidates
  # and fails the golden threshold. Set RAG_EVAL_OWNER_ID only if the corpus
  # is ever re-scoped to a real owner.

jobs:
  eval-canary:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          # Empty ref = checkout's default (the triggering sha) — schedule runs unaffected.
          ref: ${{ github.event.inputs.ref || '' }}

      # Fail loudly on a malformed override: resolveRankingConfig (src/lib/ranking-config.ts)
      # silently falls back to production defaults on bad JSON, which would turn a staged-weights
      # eval into an accidental baseline and corrupt the pair comparison.
      - name: Validate ranking-config override
        id: validate_override
        if: github.event.inputs.rag_ranking_config != ''
        run: |
          node -e '
            const raw = process.env.RAG_RANKING_CONFIG;
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
              throw new Error("rag_ranking_config must be a JSON object");
            }
            console.log("RAG_RANKING_CONFIG override active:", JSON.stringify(parsed));
          '

      - name: Preflight required secrets
        id: preflight
        run: |
          missing=""
          [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && missing="$missing SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$OPENAI_API_KEY" ] && missing="$missing OPENAI_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Eval canary cannot run — missing repo secrets:$missing"
            exit 1
          fi

      - name: Setup Node.js
        id: setup_node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Guard Supabase project identity
        id: project_guard
        run: npm run check:supabase-project

      - name: Golden retrieval eval (live corpus)
        id: golden_retrieval
        run: |
          mkdir -p .local/eval-canary
          set -o pipefail
          # --json-out writes the per-case artifact (input for scripts/build-ranking-snapshot.ts)
          # without changing stdout — the tee'd log keeps the human-readable per-case lines the
          # failure-issue analyzer parses.
          npm run eval:retrieval:quality -- --fail-on-threshold --json-out .local/eval-canary/golden-retrieval.json 2>&1 | tee .local/eval-canary/golden-retrieval.log

      - name: Answer-quality subset (live generation)
        id: answer_quality
        env:
          ANSWER_CASE_LIMIT: ${{ github.event.inputs.answer_case_limit || '44' }}
          # Canary-only latency allowance: cross-region runner -> Sydney Supabase
          # + OpenAI. Release/local eval:quality keeps the strict default gates.
          EVAL_LATENCY_CONTEXT: cross-region-runner
        run: |
          if [[ ! "$ANSWER_CASE_LIMIT" =~ ^[0-9]+$ ]] || (( ANSWER_CASE_LIMIT < 1 || ANSWER_CASE_LIMIT > 100 )); then
            echo "answer_case_limit must be an integer from 1 to 100" >&2
            exit 2
          fi
          mkdir -p .local/eval-canary
          set -o pipefail
          npm run eval:quality -- --rag-only --limit "$ANSWER_CASE_LIMIT" --output-dir .local/eval-canary/quality-reports --fail-on-threshold 2>&1 | tee .local/eval-canary/answer-quality.log

      # Phase E baseline/paired-run instrument: the five answer-quality metrics (relevance,
      # readability, artifact leaks, intent coverage, fail-closed) + per-intent structural
      # targeting over the 30-case fixture. Informational by design — no --targeting-floor,
      # exit 0 — so quality gates stay owned by the eval:quality step above; the tee'd log
      # rides the existing artifact upload. `!cancelled()` keeps the instrument running when
      # the gate subset above fails: a baseline/paired run must observe red gates too
      # (proven necessary on dispatch #57, where a red eval:quality skipped this step).
      - name: Answer-quality targeting eval (optional, dispatch-only)
        id: answer_targeting
        if: ${{ !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.answer_quality_eval == 'true' }}
        run: |
          mkdir -p .local/eval-canary
          set -o pipefail
          # --dump-answers captures per-case answer TEXTS (not retained anywhere at rest) so
          # targeting misses are diagnosable offline; rides the existing artifact upload.
          # Content sensitivity matches the tee'd log: all-public corpus, no env values.
          npm run eval:answer-quality -- --dump-answers .local/eval-canary/answer-targeting-answers.json 2>&1 | tee .local/eval-canary/answer-targeting.log

      # Uploaded on success AND failure: the JSON artifact regenerates the offline ranking
      # snapshot (download it, then `npm run build:ranking-snapshot -- --input <json> --output
      # scripts/fixtures/rag-ranking-candidate-snapshot.v1.json --source-run-id <run-id>`), and
      # the logs carry failure diagnostics. Contents match what the tee'd step logs already
      # expose (titles/file names, score telemetry, 220-char previews of the all-public corpus)
      # — no env values or secrets are written to .local/eval-canary.
      - name: Upload eval output artifact
        if: always() && steps.install.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: eval-canary-output
          path: .local/eval-canary/
          # .local/ is a hidden directory (the repo's gitignored scratch convention), which
          # upload-artifact excludes by default.
          include-hidden-files: true
          # Matches the snapshot freshness window enforced by tests/ranking-tuning.test.ts.
          retention-days: 30
          if-no-files-found: ignore

      - name: Open or update canary failure issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const { pathToFileURL } = require("node:url");
            const { analyzeFailureText } = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/productivity-core.mjs`).href);
            const label = "eval-canary";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const logPaths = [
              ".local/eval-canary/golden-retrieval.log",
              ".local/eval-canary/answer-quality.log",
            ].map((item) => path.join(process.env.GITHUB_WORKSPACE, item));
            const failureText = logPaths
              .filter((item) => fs.existsSync(item))
              .map((item) => fs.readFileSync(item, "utf8"))
              .join("\n");
            const diagnosis = analyzeFailureText(failureText);
            const stepOutcomes = {
              checkout: "${{ steps.checkout.outcome }}",
              preflight: "${{ steps.preflight.outcome }}",
              setup_node: "${{ steps.setup_node.outcome }}",
              install: "${{ steps.install.outcome }}",
              project_guard: "${{ steps.project_guard.outcome }}",
              golden_retrieval: "${{ steps.golden_retrieval.outcome }}",
              answer_quality: "${{ steps.answer_quality.outcome }}",
            };
            const body = [
              `Weekly eval canary failed on ${new Date().toISOString()}.`,
              "",
              `Run: ${runUrl}`,
              "",
              `Failure class: ${diagnosis.category} (${diagnosis.confidence})`,
              `Reason: ${diagnosis.reason}`,
              `Step outcomes: ${JSON.stringify(stepOutcomes)}`,
              "",
              "Triage order (docs/observability-slos.md §3): inspect the failed step first.",
              "Resolve provider quota/auth/config failures before rerunning; for completed evals,",
              "check hybrid_rpc_errors and `npm run check:indexing`, then investigate corpus or code drift.",
              "Do not bisect or revert code until provider health and the failure class are confirmed.",
            ].join("\n");
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Eval canary failure: weekly evaluation did not complete",
                labels: [label],
                body,
              });
            }
