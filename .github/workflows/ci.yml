name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://sjrfecxgysukkwxsowpy.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-ci-anon-key

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Runtime alignment
        run: npm run check:runtime

      - name: Edge function typecheck
        run: npm run check:edge:functions

      - name: Production readiness (CI-safe)
        run: npm run check:production-readiness:ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Deployment boot smoke
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        # No placeholder fallbacks: when the repository secrets are missing the
        # smoke must fail with its explicit missing-env error rather than
        # "pass" against a server that never saw real production env.
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run check:deployment-readiness

      - name: Restore Chromium browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Chromium UI smoke
        id: chromium-smoke
        run: npm run test:e2e:chromium

      - name: Upload UI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-ui-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  release-browser-matrix:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restore browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Full browser UI matrix
        id: e2e-matrix
        run: npm run test:e2e

      - name: Upload UI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-ui-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
