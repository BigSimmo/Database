name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://sjrfecxgysukkwxsowpy.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-ci-anon-key

jobs:
  # Fast deterministic merge gate: static checks, unit tests, and build.
  # Intended as a required status check on main together with ui-smoke,
  # Gitleaks, and one migration replay gate.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Runtime alignment
        run: npm run check:runtime

      - name: Dependency vulnerability audit
        # Non-mutating gate. The document parsers (pdf-parse, pdfjs-dist, mammoth,
        # exceljs, jszip) process untrusted uploads, so high/critical advisories in
        # the production tree must block the merge rather than wait for Dependabot.
        run: npm audit --omit=dev --audit-level=high

      - name: Edge function typecheck
        run: npm run check:edge:functions

      - name: Production readiness (CI-safe)
        run: npm run check:production-readiness:ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Deployment boot smoke
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        # No placeholder fallbacks: when the repository secrets are missing the
        # smoke must fail with its explicit missing-env error rather than
        # "pass" against a server that never saw real production env.
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAG_QUERY_HASH_SECRET: ${{ secrets.RAG_QUERY_HASH_SECRET }}
        run: npm run check:deployment-readiness

  # Chromium browser smoke in parallel with verify, so the slowest check no
  # longer serializes behind lint/typecheck/tests/build and a flaky smoke
  # rerun does not repeat them. The runner boots its own dev server, so no
  # build step is needed here.
  ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Chromium browser cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Chromium UI smoke
        id: chromium-smoke
        run: npm run test:e2e:chromium

      - name: Upload UI diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: verify-ui-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  # Database migration replay in parallel with verify and ui-smoke. This is the
  # repo-owned replay gate; if the external Supabase Preview check is already
  # required and reliable, keep this advisory or path-filtered rather than
  # requiring both replay gates on every PR.
  db-reset-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Restore Supabase Docker image cache
        uses: actions/cache@v6
        with:
          path: /tmp/supabase-docker-cache
          key: supabase-docker-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}
          restore-keys: |
            supabase-docker-${{ runner.os }}-

      - name: Load cached Supabase Docker images
        run: |
          if [ -f /tmp/supabase-docker-cache/images.tar ]; then
            docker load -i /tmp/supabase-docker-cache/images.tar
          fi

      - name: Start Supabase Local Emulator
        run: supabase start

      - name: Verify Migration Replay
        run: supabase db reset

      - name: Save Supabase Docker images
        if: always()
        continue-on-error: true
        run: |
          mkdir -p /tmp/supabase-docker-cache
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -E '^(supabase/|ghcr.io/supabase/)' \
            | sort -u \
            | xargs -r docker save -o /tmp/supabase-docker-cache/images.tar

  release-browser-matrix:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    needs: [verify, ui-smoke, db-reset-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restore browser cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Full browser UI matrix
        id: e2e-matrix
        run: npm run test:e2e

      - name: Upload UI diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-ui-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
