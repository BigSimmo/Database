name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

concurrency:
  # Deliberate one-off runs (workflow_dispatch, weekly schedule) get a per-run group so a
  # push to the same ref cannot cancel them mid-flight — release-browser-matrix takes up to
  # 70 minutes and was repeatedly killed by main churn. Push/PR runs keep the shared ref
  # group with cancel-in-progress so superseded heads still stop early.
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.run_id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://sjrfecxgysukkwxsowpy.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-ci-anon-key
  SUPABASE_CLI_VERSION: 2.108.0

jobs:
  changes:
    name: Change scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
      source_changed: ${{ steps.scope.outputs.source_changed }}
      coverage_changed: ${{ steps.scope.outputs.coverage_changed }}
      ui_changed: ${{ steps.scope.outputs.ui_changed }}
      db_changed: ${{ steps.scope.outputs.db_changed }}
      container_changed: ${{ steps.scope.outputs.container_changed }}
      rag_eval_changed: ${{ steps.scope.outputs.rag_eval_changed }}
      workflow_changed: ${{ steps.scope.outputs.workflow_changed }}
      codex_autofix_changed: ${{ steps.scope.outputs.codex_autofix_changed }}
      build_changed: ${{ steps.scope.outputs.build_changed }}
      lockfile_changed: ${{ steps.scope.outputs.lockfile_changed }}
      changed_files: ${{ steps.scope.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"

      - name: Classify changed files
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: node scripts/ci-change-scope.mjs

  sync-pr-policy-body:
    name: Sync PR policy body
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout trusted policy metadata
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-policy
          persist-credentials: false

      - name: Apply PR_POLICY_BODY.md to pull request description
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("node:fs");
            if (!fs.existsSync("PR_POLICY_BODY.md")) {
              core.info("No PR_POLICY_BODY.md template on this head; skipping PR body sync.");
              return;
            }
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/trusted-policy/scripts/pr-policy.mjs`).href;
            const { collectSatisfiedGovernanceItems, requiredClinicalGovernanceItems, section } = await import(moduleUrl);
            const pr = context.payload.pull_request;
            const existingBody = pr.body || "";
            const existingCheckedItems = new Set();
            const govSection = section(existingBody, "Clinical Governance Preflight");
            if (govSection) {
              for (const item of collectSatisfiedGovernanceItems(govSection)) existingCheckedItems.add(item);
            }
            const governance = requiredClinicalGovernanceItems
              .map((item) => {
                const checked = existingCheckedItems.has(item) ? "x" : " ";
                return `- [${checked}] ${item}`;
              })
              .join("\n");
            const template = fs.readFileSync("PR_POLICY_BODY.md", "utf8").trim();
            const body = template.replace("<!-- GOVERNANCE_PREFLIGHT -->", governance);
            if ((pr.body || "").trim() === body) {
              core.info("PR description already matches PR_POLICY_BODY.md");
              return;
            }
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body,
            });
            core.info("Updated PR description from PR_POLICY_BODY.md");

  static-pr:
    name: Static PR checks
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      # Read-only Actions access for the eval-canary liveness probe below.
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # GitHub cron fires are best-effort, and the canary's own failure-issue step only reacts
      # to runs that HAPPEN and fail — since #923 moved the canary cadence from daily to
      # weekly (Sunday 18:00 UTC), a silently dropped fire would go unnoticed for a week or
      # more. PR traffic runs many times a day, so a warn-only staleness probe here surfaces a
      # dropped weekly canary within hours instead of weeks. Never fails the job — API hiccups
      # and empty histories degrade to a warning at most.
      - name: Eval-canary liveness (warn if stale)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "eval-canary.yml",
                status: "completed",
                per_page: 1,
              });
              const latest = data.workflow_runs?.[0];
              // updated_at ~= completion time for a completed run (the REST payload carries no
              // completed_at); run_started_at is the fallback for older/partial payloads.
              const finishedAt = Date.parse(latest?.updated_at ?? latest?.run_started_at ?? "");
              if (!latest) {
                core.warning("Eval-canary liveness: no completed canary runs found.");
              } else if (!Number.isFinite(finishedAt)) {
                core.info("Eval-canary liveness: latest completed run has no parseable timestamp; skipping staleness check.");
              } else {
                const ageDays = (Date.now() - finishedAt) / 86_400_000;
                if (ageDays > 8) {
                  core.warning(
                    `Eval-canary liveness: last completed canary run was ${ageDays.toFixed(1)} days ago (${latest.html_url}). ` +
                      "The weekly Sunday 18:00 UTC schedule may have been dropped by GitHub - dispatch one manually " +
                      "(provider-backed; needs explicit approval).",
                  );
                } else {
                  core.info(`Eval-canary liveness: last completed run ${ageDays.toFixed(1)} days ago.`);
                }
              }
            } catch (error) {
              core.warning(`Eval-canary liveness check skipped: ${error.message}`);
            }

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-cached

      - name: Runtime alignment
        run: npm run check:runtime

      - name: GitHub Actions pin check
        run: npm run check:github-actions

      - name: CI scope self-test
        run: npm run check:ci-scope

      - name: CI triage self-test
        run: npm run check:ci-triage

      - name: PR policy self-test
        run: npm run check:pr-policy

      - name: Gate-manifest self-test
        run: npm run check:gate-manifest

      - name: Check docs index
        run: npm run docs:check-index
      - name: Check docs scripts
        run: npm run docs:check-scripts
      - name: Check docs links
        run: npm run docs:check-links

      - name: Dependency and duplicate-export hygiene
        run: npm run check:knip

      - name: Maintainability hotspot budgets
        run: npm run check:maintainability-budgets

      - name: Format check
        run: npm run format:check

      # Design-system guards that were previously only in the local verify:cheap
      # chain (offline + fast). Without them a stray type/icon/brand drift merged
      # green because no workflow ran them (there is no test backstop either).
      - name: Type scale guard
        run: npm run check:type-scale

      - name: Icon scale guard
        run: npm run check:icon-scale

      - name: Brand asset check
        run: npm run brand:check

      # More generated-output drift detectors that were local-only in
      # verify:cheap — same rationale as the design-system guards above. Without
      # them a stale site map, therapy index, or design-system contract merged
      # green because no workflow ran them. The gate-manifest self-test now fails
      # CI if this list drifts from verify:cheap again.
      - name: Site map drift
        run: npm run sitemap:check

      - name: Therapy data index drift
        run: npm run check:therapy-data-index

      - name: Design-system contract
        run: npm run check:design-system-contract

      # Prevent hosted SQL/tooling from assuming a platform-reserved role while
      # byte-pinning the single immutable historical migration exception.
      - name: Hosted migration-role guard
        run: npm run check:migration-role

      # Fails if a SECURITY DEFINER public function is left executable by
      # PUBLIC/anon (privilege-escalation / cross-tenant read surface).
      - name: Function-grant guard
        run: npm run check:function-grants

      # Fails if a src/app/api handler queries an owner-scoped table without a
      # recognised owner filter (defense-in-depth tenancy guard; audit D2).
      - name: Owner-scope guard
        run: npm run check:owner-scope

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  safety:
    name: Safety and config checks
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-cached

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      # A PR can only introduce a new (possibly-vulnerable) dependency when a
      # manifest/lockfile changes, so the audit blocks the merge gate only then
      # (retried to absorb transient npm-registry flake). For every other change
      # it runs advisory, and the weekly scheduled full run still enforces drift.
      - name: Dependency audit (blocking on dependency changes)
        if: needs.changes.outputs.lockfile_changed == 'true'
        run: |
          for attempt in 1 2 3; do
            if npm audit --omit=dev --audit-level=high; then exit 0; fi
            echo "npm audit attempt ${attempt} failed (likely a transient registry error); retrying in 10s" >&2
            sleep 10
          done
          npm audit --omit=dev --audit-level=high

      - name: Dependency audit (advisory)
        if: needs.changes.outputs.lockfile_changed != 'true'
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: Edge function typecheck
        run: npm run check:edge:functions

      - name: Production readiness (CI-safe)
        run: npm run check:production-readiness:ci

      - name: Codex auto-resolve workflow guard
        if: needs.changes.outputs.codex_autofix_changed == 'true'
        run: npm run check:codex-autofix-workflow

      - name: Offline RAG fixture and manifest validation
        run: npm run check:rag:fixtures

  coverage:
    name: Unit coverage
    needs: changes
    if: needs.changes.outputs.coverage_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      FAST_CHECK_SEED: ${{ github.event_name == 'schedule' && github.run_id || '424242' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-cached

      - name: Install deterministic Python PDF test prerequisite
        run: python3 -m pip install --disable-pip-version-check "PyMuPDF==1.28.0"

      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.build_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-cached

      - name: Restore Next.js build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'package-lock.json') }}-${{ hashFiles('src/**', 'data/**', 'public/**', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'package-lock.json') }}-

      - name: Build
        env:
          # experimental.cpus only parallelises static generation (small on this
          # build); the incremental .next/cache above is the real speedup. Kept as
          # a tunable so the local default stays cpus:1 (WasmHash-crash-safe).
          NEXT_BUILD_CPUS: "4"
        run: npm run build

      - name: Bundle budget (enforced — fails on >tolerancePct gzip growth vs baseline)
        run: npm run check:bundle-budget

      - name: Deployment boot smoke
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAG_QUERY_HASH_SECRET: ${{ secrets.RAG_QUERY_HASH_SECRET }}
        run: npm run check:deployment-readiness

  ui-critical:
    name: Production UI
    needs: changes
    if: needs.changes.outputs.ui_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup UI e2e environment
        uses: ./.github/actions/setup-ui-e2e

      - name: Chromium production journeys
        run: npm run test:e2e:pr

      - name: Classify exact failed test identities
        if: failure()
        run: node scripts/classify-playwright-failures.mjs

      - name: Upload UI diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-ui-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  # Quarantined production tests and mockup-only journeys share one advisory
  # install/server without weakening the required production-ui job above.
  ui-advisory:
    name: Advisory UI
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ui_changed == 'true'
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup UI e2e environment
        uses: ./.github/actions/setup-ui-e2e

      - name: Chromium quarantined and mockup journeys (advisory)
        run: npm run test:e2e:advisory

      - name: Classify exact failed test identities
        if: failure()
        run: node scripts/classify-playwright-failures.mjs

      - name: Upload advisory UI diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: advisory-ui-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  db-reset-verify:
    name: Migration replay
    needs: changes
    if: needs.changes.outputs.db_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Restore Supabase Docker image cache
        id: supabase-docker-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/supabase-docker-cache
          key: supabase-docker-${{ runner.os }}-cli-${{ env.SUPABASE_CLI_VERSION }}-${{ hashFiles('supabase/config.toml') }}
          restore-keys: |
            supabase-docker-${{ runner.os }}-cli-${{ env.SUPABASE_CLI_VERSION }}-

      - name: Load cached Supabase Docker images
        run: |
          if [ -f /tmp/supabase-docker-cache/images.tar ]; then
            if ! docker load -i /tmp/supabase-docker-cache/images.tar; then
              echo "::warning::Cached Supabase images exceeded runner disk capacity; discarding the restored tar so supabase start can pull only missing images."
            fi
            rm -f /tmp/supabase-docker-cache/images.tar
          fi

      - name: Start Supabase Local Emulator and bootstrap default ACLs
        run: |
          bootstrap_dir="$(mktemp -d)"
          mv supabase/roles.sql "${bootstrap_dir}/roles.sql"
          mv supabase/migrations "${bootstrap_dir}/migrations"
          mkdir supabase/migrations

          supabase start

          rmdir supabase/migrations
          mv "${bootstrap_dir}/migrations" supabase/migrations
          mv "${bootstrap_dir}/roles.sql" supabase/roles.sql

          db_container="$(docker ps --format '{{.Names}}' | grep '^supabase_db_' | head -n 1)"
          test -n "${db_container}"
          docker exec -i "${db_container}" \
            psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
            < supabase/roles.sql

      - name: Verify Migration Replay
        run: supabase migration up --local

      - name: Save Supabase Docker images
        if: success() && steps.supabase-docker-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p /tmp/supabase-docker-cache
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -E '^(supabase/|ghcr.io/supabase/)' \
            | sort -u \
            | xargs -r docker save -o /tmp/supabase-docker-cache/images.tar

  pr-required:
    name: PR required
    needs: [changes, static-pr, safety, coverage, build, ui-critical, db-reset-verify]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify required in-scope jobs
        env:
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          COVERAGE_CHANGED: ${{ needs.changes.outputs.coverage_changed }}
          UI_CHANGED: ${{ needs.changes.outputs.ui_changed }}
          DB_CHANGED: ${{ needs.changes.outputs.db_changed }}
          BUILD_CHANGED: ${{ needs.changes.outputs.build_changed }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          STATIC_RESULT: ${{ needs.static-pr.result }}
          SAFETY_RESULT: ${{ needs.safety.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          UI_RESULT: ${{ needs.ui-critical.result }}
          DB_RESULT: ${{ needs.db-reset-verify.result }}
        run: |
          set -euo pipefail

          require_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name result was $result"
              exit 1
            fi
          }

          require_skipped_or_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name result was $result"
              exit 1
            fi
          }

          require_success "changes" "$CHANGES_RESULT"
          require_success "static-pr" "$STATIC_RESULT"

          if [ "$DOCS_ONLY" = "true" ]; then
            require_skipped_or_success "safety" "$SAFETY_RESULT"
          else
            require_success "safety" "$SAFETY_RESULT"
          fi

          if [ "$COVERAGE_CHANGED" = "true" ]; then
            require_success "coverage" "$COVERAGE_RESULT"
          else
            require_skipped_or_success "coverage" "$COVERAGE_RESULT"
          fi

          if [ "$BUILD_CHANGED" = "true" ]; then
            require_success "build" "$BUILD_RESULT"
          else
            require_skipped_or_success "build" "$BUILD_RESULT"
          fi

          if [ "$UI_CHANGED" = "true" ]; then
            require_success "production-ui" "$UI_RESULT"
          else
            require_skipped_or_success "production-ui" "$UI_RESULT"
          fi

          if [ "$DB_CHANGED" = "true" ]; then
            require_success "db-reset-verify" "$DB_RESULT"
          else
            require_skipped_or_success "db-reset-verify" "$DB_RESULT"
          fi

          echo "Required in-scope PR checks passed."

  release-browser-matrix:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    needs: [pr-required]
    runs-on: ubuntu-24.04
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-cached

      - name: Restore Next.js build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'package-lock.json') }}-${{ hashFiles('src/**', 'data/**', 'public/**', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'package-lock.json') }}-

      - name: Build
        env:
          NEXT_BUILD_CPUS: "4"
        run: npm run build

      - name: Restore browser cache
        id: pw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps
            npx playwright install
          else
            npx playwright install --with-deps
          fi

      - name: Full browser UI matrix
        id: e2e-matrix
        run: npm run test:e2e

      - name: Upload UI diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-ui-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
