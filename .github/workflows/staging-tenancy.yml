name: Staging tenancy isolation

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

concurrency:
  group: staging-tenancy-isolation
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cross-tenant:
    name: Cross-tenant staging harness
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run cross-tenant staging checks
        env:
          CROSS_TENANT_STAGING_APP_URL: ${{ secrets.CROSS_TENANT_STAGING_APP_URL }}
          CROSS_TENANT_SUPABASE_URL: ${{ secrets.CROSS_TENANT_SUPABASE_URL }}
          CROSS_TENANT_PROJECT_REF: ${{ secrets.CROSS_TENANT_PROJECT_REF }}
          CROSS_TENANT_PUBLISHABLE_KEY: ${{ secrets.CROSS_TENANT_PUBLISHABLE_KEY }}
          CROSS_TENANT_SERVICE_ROLE_KEY: ${{ secrets.CROSS_TENANT_SERVICE_ROLE_KEY }}
          CROSS_TENANT_USER_A_EMAIL: ${{ secrets.CROSS_TENANT_USER_A_EMAIL }}
          CROSS_TENANT_USER_A_PASSWORD: ${{ secrets.CROSS_TENANT_USER_A_PASSWORD }}
          CROSS_TENANT_USER_B_EMAIL: ${{ secrets.CROSS_TENANT_USER_B_EMAIL }}
          CROSS_TENANT_USER_B_PASSWORD: ${{ secrets.CROSS_TENANT_USER_B_PASSWORD }}
          CROSS_TENANT_DOCUMENT_BUCKET: ${{ vars.CROSS_TENANT_DOCUMENT_BUCKET }}
          CROSS_TENANT_EVIDENCE_PATH: artifacts/staging-tenancy-evidence.json
          CROSS_TENANT_COMMIT_SHA: ${{ github.sha }}
          CROSS_TENANT_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npm run test:cross-tenant:staging

      - name: Upload tenancy evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: staging-tenancy-evidence-${{ github.run_id }}
          path: artifacts/staging-tenancy-evidence.json
          if-no-files-found: error
          retention-days: 14
