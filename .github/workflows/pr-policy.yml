name: PR Policy

on:
  pull_request_target:
    branches: [main, "release/**"]
    types: [opened, edited, synchronize, reopened, ready_for_review, labeled, unlabeled]
  merge_group:

concurrency:
  group: pr-policy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  policy:
    name: PR policy
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Accept merge queue validation
        if: github.event_name == 'merge_group'
        run: echo "PR metadata was validated before merge-queue entry."

      # pull_request_target runs trusted workflow-revision code. Checkout
      # github.workflow_sha (not a moving base_ref tip, and not a potentially
      # stale pull_request.base.sha from an older PR) so the policy script is
      # always the exact revision that triggered this run. Never execute the PR
      # head or persist credentials.
      - name: Checkout trusted policy
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Validate pull request evidence
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/pr-policy.mjs`).href;
            const { evaluatePullRequestPolicy } = await import(moduleUrl);
            const pr = context.payload.pull_request;
            if (!pr?.number) {
              core.setFailed("Missing pull_request.number in pull_request_target payload.");
              return;
            }
            let latestPr;
            try {
              latestPr = (
                await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                })
              ).data;
            } catch (error) {
              core.setFailed(
                `Unable to fetch latest PR metadata for PR #${pr.number}: ${error instanceof Error ? error.message : String(error)}. If this was transient, rerun the job; if it persists, verify this workflow still has pull-request read access.`,
              );
              return;
            }

            if (latestPr.draft) {
              core.notice("Draft PR: metadata policy will be enforced when the PR is marked ready for review.");
              return;
            }

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const result = evaluatePullRequestPolicy({
              title: latestPr.title,
              body: latestPr.body || "",
              headRef: latestPr.head.ref,
              files: changedFiles.map((file) => file.filename),
            });

            const warnings = result.warnings || [];
            await core.summary
              .addHeading("PR policy")
              .addRaw(`Clinical risk: ${result.classification.clinicalRisk ? "yes" : "no"}<br>`)
              .addRaw(`Operational risk: ${result.classification.operationalRisk ? "yes" : "no"}<br>`)
              .addRaw(`UI change: ${result.classification.ui ? "yes" : "no"}<br>`)
              .addRaw(`Blocking issues: ${result.errors.length}<br>`)
              .addRaw(`Advisory warnings: ${warnings.length}<br>`)
              .write();

            // Advisory metadata nudges (title/summary/verification/UI/risk) are
            // surfaced but never fail the check. Two conditions block the merge: a
            // clinical-risk PR with an incomplete Clinical Governance Preflight, and a
            // RAG-ranking-surface PR without an explicit `RAG impact:` declaration
            // (docs/rag-behaviour/safeguards.md).
            for (const warning of warnings) core.warning(warning);

            if (!result.ok) {
              for (const error of result.errors) core.error(error);
              core.setFailed(
                `PR policy found ${result.errors.length} blocking issue(s) — see the errors above (Clinical Governance Preflight and/or the RAG impact declaration), fix the PR body, and rerun.`,
              );
            }
