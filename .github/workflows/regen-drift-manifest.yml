name: Regen drift manifest

# Regenerates supabase/drift-manifest.json when local Docker Desktop / WSL
# cannot start. Triggered by pushing the marker file below (workflow_dispatch
# is also supported once this file exists on the default branch). Uploads the
# manifest as an artifact for the operator to commit — does not push.

on:
  push:
    paths:
      - ".github/triggers/regen-drift-manifest"
      - ".github/workflows/regen-drift-manifest.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: regen-drift-manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Regenerate drift manifest
        run: npm run drift:manifest

      - name: Upload drift-manifest.json
        uses: actions/upload-artifact@v4
        with:
          name: drift-manifest
          path: supabase/drift-manifest.json
          if-no-files-found: error
