name: Codex auto-resolve review comments

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-autoresolve-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event.pull_request.head.sha || github.event.review.id || github.event.comment.id }}
  cancel-in-progress: false

jobs:
  request-codex-autoresolve:
    name: Request Codex auto-resolve
    runs-on: ubuntu-latest
    steps:
      - name: Ask Codex to resolve review comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const codexLoginFragment = "chatgpt-codex-connector";

            async function loadPullRequest() {
              if (context.eventName === "issue_comment") {
                const issue = context.payload.issue;
                if (!issue?.pull_request) {
                  core.notice("Skipping because this issue comment is not on a pull request.");
                  return null;
                }

                const { data } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: issue.number,
                });
                return data;
              }

              return context.payload.pull_request || null;
            }

            function sourceActor() {
              if (context.eventName === "pull_request_review") {
                return context.payload.review?.user?.login || "";
              }
              return context.payload.comment?.user?.login || "";
            }

            function sourceBody() {
              if (context.eventName === "pull_request_review") {
                return context.payload.review?.body || "";
              }
              return context.payload.comment?.body || "";
            }

            function sourceId() {
              if (context.eventName === "pull_request_review") {
                return `review:${context.payload.review?.id}`;
              }
              return `comment:${context.payload.comment?.id}`;
            }

            if (!sourceActor().includes(codexLoginFragment)) {
              core.notice(`Skipping because actor ${sourceActor()} is not the Codex review bot.`);
              return;
            }

            if (context.payload.comment?.in_reply_to_id) {
              core.notice("Skipping Codex auto-resolve request because the comment is a review-thread reply.");
              return;
            }

            if (sourceBody().includes("codex-autoresolve:") || sourceBody().includes("@codex resolve all review comments")) {
              core.notice("Skipping Codex auto-resolve request because the source comment already looks like an auto-resolve request.");
              return;
            }

            const pr = await loadPullRequest();
            if (!pr) {
              return;
            }

            if (pr.state !== "open") {
              core.notice(`Skipping because pull request #${pr.number} is ${pr.state}.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;
            const marker = `<!-- codex-autoresolve:${pr.head.sha} -->`;

            const existingComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            if (existingComments.some((comment) => (comment.body || "").includes(marker))) {
              core.notice("Skipping duplicate Codex auto-resolve request for this PR head commit.");
              return;
            }

            const prompt = [
              marker,
              `<!-- codex-autoresolve-source:${context.eventName}:${sourceId()} -->`,
              "@codex resolve all review comments using the repository instructions. Always fix P0 and P1 findings. For P2 and lower findings, decide whether each is worth fixing automatically. Fix clear, scoped, low-risk issues with the best minimal change; otherwise reply explaining why the issue is deferred or not actionable. After each fix or decision, resolve the review conversation if supported. Do not use external APIs, paid services, credentials, dependency changes, or broad refactors unless explicitly authorized. Add targeted tests where behavior changes and run the narrowest relevant validation.",
            ].join("\n\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: prompt,
            });
