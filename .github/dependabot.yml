version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Perth"
    open-pull-requests-limit: 5
    # Batch low-risk updates so a solo maintainer reviews a couple of grouped PRs
    # instead of up to ~5/week each triggering full CI. Majors stay individual —
    # each major deserves its own review (per the AGENTS.md dependency protocol).
    groups:
      npm-production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      npm-development:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    # Hold the TypeScript major (7.x is the native Go port): typescript-eslint /
    # eslint-config-next do not support the native port yet — their peer range
    # caps typescript at <6.1.0, so a major bump breaks the type-aware lint gate.
    # The repo keeps a separate @typescript/typescript6 for the compiler API.
    # Remove this once the lint toolchain ships native-port support.
    # Context: merged #1014 / closed #990.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Perth"
    open-pull-requests-limit: 5
    # One batched PR for all action SHA bumps keeps pinned versions uniform across
    # workflows/composites (mitigates the action-version-skew finding) and keeps
    # check:github-actions green in a single review.
    groups:
      github-actions:
        patterns: ["*"]
