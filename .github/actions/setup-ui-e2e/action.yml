name: Setup UI e2e environment
description: >-
  Node + cached node_modules and Chromium, where the ~30-60s apt `--with-deps`
  reinstall runs only on a browser-cache miss instead of every job. Playwright then
  boots `next dev` itself (run-playwright.mjs) and warms the routes before testing.
runs:
  using: composite
  steps:
    - name: Setup Node and dependencies
      uses: ./.github/actions/setup-node-cached

    - name: Restore Chromium browser cache
      id: pw-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    # On a cache hit the browser binary is already present, so skip the apt
    # `--with-deps` reinstall and just validate the binary. Only a miss installs deps.
    - name: Install Chromium
      shell: bash
      run: |
        if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
          npx playwright install chromium
        else
          npx playwright install --with-deps chromium
        fi
